<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="https://i.pinimg.com/1200x/c9/75/6d/c9756d97990c64ca7908a84862ab8053.jpg">
  <title>Tómbola de frases</title>
<style>
  body{
    background-image: url("https://i.imgur.com/QENpMVB.jpeg");
    background-position: center;
    background-repeat: no-repeat;
    size: 
  }

  body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6); /* oscurece */
  z-index: -1;
}

  h1, h2, h3{
    text-align: center;
    color: white;
  }

  * {
    box-sizing: border-box;
  }
  .contenedor {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px;
    align-items: start;
  }

  .columna {
    border: 1px solid #f5f5f5;
    padding: 15px;
    border-radius: 10px;
  }

  /* Centro */
  #lista {
    text-align: left;
    color: white;
  }

  /* Resultado destacado */
  #resultado {
    margin-top: 20px;
    padding: 20px;
    border-radius: 10px;
    background-color: #f5f5f5;
    font-size: 25px;
    font-weight: bold;
    min-height: 60px;
    text-align: center;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.3s ease;
    pointer-events: none;
  }
  #resultado.visible {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  .destacado {
    border: 2px solid #4CAF50;
    background-color: #eaffea;
  }

  input {
    width: 100%;
    padding: 10px;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    cursor: pointer;
  }
  footer{
    text-align: center;
    color: white;
  }
  @media (max-width: 900px) {
  .contenedor {
    grid-template-columns: 1fr; /* 🔥 se vuelve vertical */
  }
}
</style>
</head>
<body>

  <h1>Tómbola interactiva</h1>
<div class="contenedor">

  <!-- Columna izquierda -->
  <div class="columna">
    <h3>Ingresa frases:</h3>

    <input type="text" id="inputFrase" placeholder="Escribe una frase...">

    <button onclick="agregarFrase()">Agregar</button>
  </div>

  <!-- Columna centro -->
  <div class="columna">
    <h3>Lista de frases</h3>
    <div id="lista"></div>
    <button onclick="sortear()">Sortear</button>
  </div>

  <!-- Columna derecha -->
  <div class="columna">
    <h3>La frase que te corresponde es:</h3>
    <div id="resultado" class="destacado">
      
    </div>
  </div>

</div>
<footer>
  <p>Ryodan Tech SpA Ⓜ︎</p>
</footer>
  <script>
    // Array con frases por defecto
    let frases = [];

    function agregarFrase() {
      const input = document.getElementById("inputFrase");
      const texto = input.value.trim();

      if (texto === "") {
        alert("Escribe algo");
        return;
      }

      frases.push(texto);
      input.value = ""; // limpiar input

      mostrarLista();
    }

    function mostrarLista() {
      const listaDiv = document.getElementById("lista");

      listaDiv.innerHTML = "<p>Frases:</p>";

      frases.forEach((frase, index) => {
        listaDiv.innerHTML += `<p>${index + 1}- ${frase}</p>`;
      });
    }

    function sortear() {
      if (frases.length === 0) {
        alert("No hay frases");
        return;
      }

      const random = Math.floor(Math.random() * frases.length);
      document.getElementById("resultado").innerText = frases[random];

      const resultadoDiv = document.getElementById("resultado");
      resultadoDiv.classList.add("visible");
    }

    // Mostrar lista inicial
    mostrarLista();
  </script>
</body>
</html>
